<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desktop Whiteboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="whiteboard">
        <div id="clock">12:00</div>
        <div id="tasks">
            <h2>Tasks</h2>
            <ul>
                <li>Task 1</li>
                <li>Task 2</li>
            </ul>
        </div>
        <div id="stats">
            <div>CPU: <span id="cpu">--</span></div>
            <div>RAM: <span id="ram">--</span></div>
            <div id="disks-container"></div>
            <div>GPU: <span id="gpu">--</span></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
